openapi: 3.1.0
info:
  title: LectureNote Suite Actions
  version: 2.2.17
servers:
  - url: https://study-xqe8.onrender.com

components:
  schemas: {}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

security:
  - bearerAuth: []

paths:
  /dashboard:
    get:
      operationId: getDashboard
      summary: Get compact menu/status dashboard for sources, mapping, notes, problem packs, calculators, and active workflows.
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard status.

  /mapping/status:
    get:
      operationId: getMappingStatus
      summary: Show detailed mapped and unmapped sources, units, and missing references.
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Mapping status.

  /workflow/options:
    get:
      operationId: getWorkflowOptions
      summary: Get detailed subjects, sources, units, unit maps, and work modes.
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Workflow options.

  /sources/search:
    post:
      operationId: searchSources
      summary: Search saved source chunks by query, subject, and source type, including problem/calculator artifact types.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                subject:
                  type: string
                source_types:
                  type: array
                  items:
                    type: string
                limit:
                  type: integer
      responses:
        "200":
          description: Search results.

  /sources/unmapped:
    get:
      operationId: listUnmappedSources
      summary: List sources not covered by saved unit maps.
      parameters:
        - name: source_type
          in: query
          required: false
          schema:
            type: string
        - name: subject
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Unmapped sources.

  /sources/{source_id}:
    delete:
      operationId: deleteSource
      summary: Delete an uploaded source and extracted chunks.
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted source.

  /unit-maps:
    post:
      operationId: saveUnitMap
      summary: Save GPT-generated unit map. Use unit_map_json as JSON object text for reliable Custom GPT Actions transmission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - unit_map_json
              properties:
                title:
                  type: string
                source_ids:
                  type: array
                  items:
                    type: string
                unit_map_json:
                  type: string
                  description: JSON string containing the unit map object. Must parse to an object with schemaVersion, mappingBasis, units, unmapped, and extensionOnly.
                created_by:
                  type: string
      responses:
        "200":
          description: Saved unit map.
    get:
      operationId: listUnitMaps
      summary: List saved unit maps.
      responses:
        "200":
          description: Unit maps.

  /unit-maps/{unit_map_id}:
    get:
      operationId: getUnitMap
      summary: Get a saved unit map.
      parameters:
        - name: unit_map_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unit map.

  /study/notes:
    get:
      operationId: listStudyNotes
      summary: List generated notes, external notes, exam cram sheets, and calculator manuals.
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
        - name: source_type
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Study notes.
    post:
      operationId: saveStudyNote
      summary: Save a markdown study note as generated artifact.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content_markdown
              properties:
                title:
                  type: string
                content_markdown:
                  type: string
                subject:
                  type: string
                source_type:
                  type: string
                series_id:
                  type: string
                doc_key:
                  type: string
                unitNumber:
                  type: string
                unitTitle:
                  type: string
                change_summary:
                  type: string
                replace_latest:
                  type: boolean
                  description: Defaults to false. Replacement is honored only with replace_source_id; otherwise a new source is inserted.
                replace_source_id:
                  type: string
                  description: Existing Study Note source_id to replace/revise safely.
      responses:
        "200":
          description: Saved study note.

  /study/notes/{source_id}:
    get:
      operationId: getStudyNote
      summary: Get markdown content for a study note.
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Study note content.
    put:
      operationId: updateStudyNote
      summary: Replace markdown content for an existing study note.
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content_markdown
              properties:
                title:
                  type: string
                content_markdown:
                  type: string
                change_summary:
                  type: string
      responses:
        "200":
          description: Updated study note.


  /study/notes/{source_id}/versions:
    get:
      operationId: listStudyNoteVersions
      summary: List saved edit versions for a study note so it can be restored.
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Study note versions.

  /study/notes/{source_id}/restore:
    post:
      operationId: restoreStudyNoteVersion
      summary: Restore a study note to a selected previous version while saving the restore as a new version.
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - version_id
              properties:
                version_id:
                  type: string
                change_summary:
                  type: string
      responses:
        "200":
          description: Restored study note.

  /exam-cram:
    post:
      operationId: saveExamCram
      summary: Save a pre-exam cram sheet as markdown.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content_markdown
              properties:
                title:
                  type: string
                content_markdown:
                  type: string
                subject:
                  type: string
                series_id:
                  type: string
                change_summary:
                  type: string
                replace_latest:
                  type: boolean
      responses:
        "200":
          description: Saved exam cram sheet.

  /problem-packs:
    post:
      operationId: saveProblemPack
      summary: Save a SolvePad problem pack to the server main repository. SolvePad opens it from the repository and does not auto-copy it to device storage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                pack:
                  type: object
                  description: SolvePad problem pack object.
                pack_json:
                  type: string
                  description: JSON object text fallback for Custom GPT Actions reliability. Use when object transmission is unstable.
                subject:
                  type: string
                unitNumber:
                  type: string
                unitTitle:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                source_refs:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Saved server-main problem pack with source_id and SolvePad shortcut URLs. Device save is optional in SolvePad UI.
    get:
      operationId: listProblemPacks
      summary: List saved SolvePad problem packs registered in the source index.
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Problem packs.

  /calculator/projects:
    get:
      operationId: listCalculatorProjects
      summary: List saved CASIO calculator projects.
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Calculator projects.

  /calculator/projects/{project_id}:
    get:
      operationId: getCalculatorProject
      summary: Get saved calculator project with blueprint, TXT files, analysis, and manual.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Calculator project.
    delete:
      operationId: deleteCalculatorProject
      summary: Delete a saved calculator project.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted calculator project.

  /calculator/validate:
    post:
      operationId: validateCalculatorBlueprint
      summary: Validate CASIO PRGM blueprint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                storage_mode:
                  type: string
                  enum: [device, server]
                  default: device
                  description: device keeps calculator output in the browser/device and does not register server sources. server saves legacy calculator_project/program/manual/analysis sources.
                blueprint:
                  type: object
                blueprint_json:
                  type: string
                  description: JSON object text fallback for Custom GPT Actions reliability.
                metadata:
                  type: object
                analysis_markdown:
                  type: string
                manual_markdown:
                  type: string
                replace_calculator_project_id:
                  type: string
      responses:
        "200":
          description: Validation result.

  /calculator/generate:
    post:
      operationId: generateCalculatorProgram
      summary: Generate CASIO PRGM TXT files. Default storage_mode=device returns files for browser/device storage without registering server sources. Use storage_mode=server only when explicit server archival is required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                storage_mode:
                  type: string
                  enum: [device, server]
                  default: device
                  description: device keeps calculator output in the browser/device and does not register server sources. server saves legacy calculator_project/program/manual/analysis sources.
                blueprint:
                  type: object
                blueprint_json:
                  type: string
                  description: JSON object text fallback for Custom GPT Actions reliability.
                metadata:
                  type: object
                analysis_markdown:
                  type: string
                manual_markdown:
                  type: string
                replace_calculator_project_id:
                  type: string
      responses:
        "200":
          description: Generated calculator result. In device mode source_id fields are empty; in server mode searchable calculator sources are registered.


  /maintenance/cleanup:
    post:
      operationId: runMaintenanceCleanup
      summary: Remove missing source references, optionally delete old workflow history, and run SQLite WAL/VACUUM maintenance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                remove_missing_unit_refs:
                  type: boolean
                  default: true
                delete_old_workflows:
                  type: boolean
                  default: false
                workflow_days:
                  type: integer
                  default: 30
                checkpoint_keep_latest:
                  type: integer
                  default: 5
                wal_checkpoint:
                  type: boolean
                  default: true
                vacuum:
                  type: boolean
                  default: false
                  description: Heavy operation. Use manually only.
      responses:
        "200":
          description: Cleanup report.

  /transcripts/revisions:
    post:
      operationId: saveTranscriptRevision
      summary: Save a corrected transcript.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - corrected_text
              properties:
                title:
                  type: string
                corrected_text:
                  type: string
                subject:
                  type: string
                original_transcript_source_id:
                  type: string
                terminology_map:
                  type: object
                change_log:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: Saved transcript revision.

  /workflow/runs:
    post:
      operationId: createWorkflowRun
      summary: Create a sequential long-running workflow run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - mode
              properties:
                title:
                  type: string
                mode:
                  type: string
                subject:
                  type: string
                selected_units:
                  type: array
                  items:
                    type: string
                workflow_plan_id:
                  type: string
                total_steps:
                  type: integer
                metadata:
                  type: object
      responses:
        "200":
          description: Created workflow run.
    get:
      operationId: listWorkflowRuns
      summary: List workflow runs.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Workflow runs.

  /workflow/runs/{run_id}/next:
    get:
      operationId: getNextWorkflowStep
      summary: Get the next step for a workflow run.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Next workflow step.

  /workflow/checkpoints:
    post:
      operationId: saveWorkflowCheckpoint
      summary: Save a checkpoint after a workflow step.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - run_id
                - step_index
              properties:
                run_id:
                  type: string
                step_index:
                  type: integer
                step_label:
                  type: string
                status:
                  type: string
                saved_refs:
                  type: object
                next_action:
                  type: string
                notes:
                  type: string
                advance_to_next:
                  type: boolean
      responses:
        "200":
          description: Saved checkpoint.
