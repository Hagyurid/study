<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <title>CASIO PRGM Studio</title>
  <style>
    :root { --bg:#0f172a; --panel:#111827; --panel2:#1f2937; --text:#e5e7eb; --muted:#9ca3af; --line:#334155; --accent:#38bdf8; --bad:#f87171; --warn:#fbbf24; --ok:#34d399; }
    * { box-sizing:border-box; } body { margin:0; font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    header { padding:16px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    h1 { margin:0; font-size:20px; } h2 { font-size:15px; margin:0 0 10px; color:#f8fafc; } label { display:block; color:var(--muted); font-size:12px; margin:10px 0 4px; }
    main { display:grid; grid-template-columns: 360px 1fr; gap:14px; padding:14px; } section { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; }
    input, textarea, select { width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 10px; background:#020617; color:var(--text); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }
    textarea { min-height:180px; resize:vertical; } button, a.btn { border:0; border-radius:10px; padding:9px 11px; margin:4px 4px 4px 0; color:#00111f; background:var(--accent); font-weight:800; cursor:pointer; text-decoration:none; display:inline-block; }
    button.secondary, a.secondary { background:#94a3b8; } button.warn { background:var(--warn); } button.bad { background:var(--bad); } button.ok { background:var(--ok); }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; } .muted { color:var(--muted); font-size:12px; } .list { border:1px solid var(--line); border-radius:12px; overflow:hidden; } .item { padding:10px; border-bottom:1px solid var(--line); background:var(--panel2); } .item:last-child { border-bottom:0; }
    pre { white-space:pre-wrap; overflow:auto; background:#020617; border:1px solid var(--line); border-radius:12px; padding:12px; min-height:120px; max-height:420px; font-size:12px; }
    .tabs button { background:#1f2937; color:#dbeafe; } .tabs button.active { background:var(--accent); color:#00111f; } .panel { display:none; } .panel.active { display:block; }
    @media(max-width:900px){ main { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header>
  <div><h1>CASIO PRGM Studio</h1><div class="muted">GPT가 서버에 저장한 계산기 프로젝트가 자동으로 뜹니다</div></div>
  <div class="row"><a class="btn secondary" href="/">홈</a><a class="btn secondary" href="/upload">자료 업로드</a><a class="btn secondary" href="/static/solvepad/index.html">SolvePad</a><button onclick="saveSettings()">설정 저장</button></div>
</header>
<main>
  <section>
    <h2>1. 연결</h2>
    <label>API Base URL</label><input id="apiBase" placeholder="https://study-xqe8.onrender.com" />
    <label>Action Key</label><input id="actionKey" type="password" placeholder="Render ACTION_API_KEY" />
    <label>과목 필터</label><input id="subject" placeholder="예: CRE" />
    <div class="row"><button onclick="saveSettings()">저장</button><button class="secondary" onclick="listProjects()">저장 프로젝트 불러오기</button></div>
    <div class="muted">Action Key는 이 브라우저 localStorage에만 저장됩니다. GPT가 저장한 계산기는 링크 없이 이 목록에 바로 표시됩니다.</div>
    <h2 style="margin-top:18px">2. 저장된 계산기 프로젝트</h2>
    <div id="projectList" class="list"><div class="item muted">목록 없음</div></div>
  </section>
  <section>
    <div class="row" style="justify-content:space-between"><h2>3. 설계 / 생성 / 해설</h2><span id="currentProject" class="muted">미선택</span></div>
    <label>제목</label><input id="title" placeholder="예: CRE 반응기 계산 PRGM" />
    <div class="tabs"><button id="tabBlueprint" class="active" onclick="showTab('blueprint')">설계도 JSON</button><button id="tabAnalysis" onclick="showTab('analysis')">자료 분석/구상</button><button id="tabManual" onclick="showTab('manual')">사용법/구조 해설</button></div>
    <div id="panelBlueprint" class="panel active"><textarea id="blueprint" style="min-height:320px" placeholder='{"meta":{"strictFinalNames":true},"files":[{"name":"MAIN","lines":[{"type":"text","value":"HELLO"}]}]}'></textarea></div>
    <div id="panelAnalysis" class="panel"><textarea id="analysis" style="min-height:320px" placeholder="GPT가 먼저 자료를 분석해서 어떤 계산을 프로그램화할지 구상한 내용"></textarea></div>
    <div id="panelManual" class="panel"><textarea id="manual" style="min-height:320px" placeholder="최종 파일 사용법, 프로그램 구조, 변수 의미, 입력 순서, 주의사항"></textarea></div>
    <div class="row"><button class="warn" onclick="validateBlueprint()">검사</button><button class="ok" onclick="generateAndSave()">TXT 생성 + 저장</button><button class="secondary" onclick="downloadZip()">TXT ZIP 다운로드</button><button class="secondary" onclick="downloadProjectZip()">프로젝트 ZIP</button><button class="bad" onclick="deleteCurrent()">현재 프로젝트 삭제</button></div>
    <h2>결과</h2><div id="fileList" class="list" style="margin-bottom:10px"><div class="item muted">생성 파일 없음</div></div><pre id="output">결과 없음</pre>
  </section>
</main>
<script>
const $ = id => document.getElementById(id); let selectedProjectId = new URLSearchParams(location.search).get('projectId') || '';
function apiBase(){ return ($('apiBase').value.trim() || location.origin).replace(/\/$/,''); }
function headers(json=true){ const h={}; if(json) h['Content-Type']='application/json'; const k=$('actionKey').value || localStorage.getItem('lecturenote_action_key') || ''; if(k) h['X-Action-Key']=k; return h; }
function msg(x){ $('output').textContent = typeof x === 'string' ? x : JSON.stringify(x,null,2); }
function saveSettings(){ localStorage.setItem('apiBase',$('apiBase').value.trim() || location.origin); localStorage.setItem('lecturenote_action_key',$('actionKey').value); localStorage.setItem('casio_subject',$('subject').value.trim()); localStorage.setItem('casio_blueprint_draft',$('blueprint').value); localStorage.setItem('casio_analysis_draft',$('analysis').value); localStorage.setItem('casio_manual_draft',$('manual').value); msg('설정 저장 완료'); }
function loadSettings(){ $('apiBase').value=localStorage.getItem('apiBase') || location.origin; $('actionKey').value=localStorage.getItem('lecturenote_action_key') || ''; $('subject').value=localStorage.getItem('casio_subject') || ''; $('blueprint').value=localStorage.getItem('casio_blueprint_draft') || ''; $('analysis').value=localStorage.getItem('casio_analysis_draft') || ''; $('manual').value=localStorage.getItem('casio_manual_draft') || ''; }
async function request(path, opts={}){ const res=await fetch(apiBase()+path,opts); const text=await res.text(); let data; try{data=JSON.parse(text)}catch{data=text} if(!res.ok) throw new Error(typeof data==='string'?data:JSON.stringify(data)); return data; }
function blueprintObj(){ const raw=$('blueprint').value.trim(); if(!raw) throw new Error('설계도 JSON이 비어 있습니다.'); return JSON.parse(raw); }
function payload(){ return {title:$('title').value || 'CASIO PRGM Project', blueprint:blueprintObj(), metadata:{subject:$('subject').value.trim(), origin:'casio-studio'}, analysis_markdown:$('analysis').value, manual_markdown:$('manual').value, replace_calculator_project_id:selectedProjectId || ''}; }
function showTab(name){ for(const n of ['blueprint','analysis','manual']){ $('tab'+cap(n)).classList.toggle('active',n===name); $('panel'+cap(n)).classList.toggle('active',n===name); } } function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}
async function validateBlueprint(){ try{ saveSettings(); const data=await request('/calculator/validate',{method:'POST',headers:headers(),body:JSON.stringify(payload())}); msg(data); }catch(e){ msg('오류: '+e.message); } }
async function generateAndSave(){ try{ saveSettings(); const data=await request('/calculator/generate',{method:'POST',headers:headers(),body:JSON.stringify(payload())}); selectedProjectId=data.calculator_project_id; $('currentProject').textContent='선택: '+selectedProjectId; renderFiles(data.generated?.files||[]); msg(data); listProjects(); }catch(e){ msg('오류: '+e.message); } }
async function downloadZip(){ try{ saveSettings(); const res=await fetch(apiBase()+'/calculator/generate.zip',{method:'POST',headers:headers(),body:JSON.stringify(payload())}); if(!res.ok) throw new Error(await res.text()); const blob=await res.blob(); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='casio-prgm-files.zip'; a.click(); URL.revokeObjectURL(a.href); }catch(e){ msg('오류: '+e.message); } }
async function listProjects(){ try{ const subject=encodeURIComponent($('subject').value.trim()); const data=await request('/calculator/projects'+(subject?'?subject='+subject:''),{headers:headers(false)}); const list=data.calculator_projects||[]; $('projectList').innerHTML=list.length?'':'<div class="item muted">저장 프로젝트 없음</div>'; for(const p of list){ const el=document.createElement('div'); el.className='item'; el.innerHTML=`<b>${esc(p.title)}</b><div class="muted">${esc(p.subject||'미지정')} · ${esc(p.calculator_project_id)} · files ${p.file_count}</div>`; const load=document.createElement('button'); load.textContent='열기'; load.onclick=()=>loadProject(p.calculator_project_id); const manual=document.createElement('button'); manual.textContent='사용법'; manual.className='secondary'; manual.onclick=()=>window.open(apiBase()+`/calculator/projects/${encodeURIComponent(p.calculator_project_id)}/manual`); el.appendChild(load); el.appendChild(manual); $('projectList').appendChild(el); } msg(data); }catch(e){ msg('오류: '+e.message); } }
async function loadProject(id){ try{ const data=await request(`/calculator/projects/${encodeURIComponent(id)}`,{headers:headers(false)}); selectedProjectId=id; $('currentProject').textContent='선택: '+id; $('title').value=data.title||''; $('blueprint').value=JSON.stringify(data.blueprint||{},null,2); $('analysis').value=data.analysis_markdown||''; $('manual').value=data.manual_markdown||''; renderFiles(data.generated?.files||[]); msg(data); }catch(e){ msg('오류: '+e.message); } }
async function downloadProjectZip(){ if(!selectedProjectId) return msg('먼저 프로젝트를 열어야 합니다.'); try{ const res=await fetch(apiBase()+`/calculator/projects/${encodeURIComponent(selectedProjectId)}/download.zip`,{headers:headers(false)}); if(!res.ok) throw new Error(await res.text()); const blob=await res.blob(); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=selectedProjectId+'-casio.zip'; a.click(); URL.revokeObjectURL(a.href); }catch(e){ msg('오류: '+e.message); } }
async function deleteCurrent(){ if(!selectedProjectId) return msg('삭제할 프로젝트가 선택되지 않았습니다.'); if(!confirm('현재 계산기 프로젝트를 삭제할까요?')) return; try{ const data=await request(`/calculator/projects/${encodeURIComponent(selectedProjectId)}`,{method:'DELETE',headers:headers(false)}); selectedProjectId=''; $('currentProject').textContent='미선택'; msg(data); listProjects(); }catch(e){ msg('오류: '+e.message); } }
function renderFiles(files){ $('fileList').innerHTML=files.length?'':'<div class="item muted">생성 파일 없음</div>'; for(const f of files){ const el=document.createElement('div'); el.className='item'; const name=f.name||f.filename||f.fileName||'PROGRAM.TXT'; const raw=(f.content ?? f.program ?? f.code ?? f.text ?? ''); const content=String(raw); const body=content.trim()?esc(content):'<span class="muted">내용 없음</span>'; el.innerHTML=`<b>${esc(name)}</b><pre>${body}</pre>`; $('fileList').appendChild(el); } }
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
loadSettings(); if(selectedProjectId){ loadProject(selectedProjectId); } else { listProjects(); } if('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
</script>
</body>
</html>
