<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Study Note Studio</title>
  <link rel="stylesheet" href="styles.css?v=22_26" />
  <script>
    window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true }, svg: { fontCache: 'global' } };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <header class="appbar">
    <div><b>Study Note Studio</b><span id="saveState">문서형 편집 모드</span></div>
    <nav><a href="/">홈</a><a href="/upload">자료 업로드</a><a href="/static/solvepad/index.html">SolvePad</a><a href="/static/casio/index.html">계산기</a></nav>
  </header>
  <main class="layout">
    <aside class="rail">
      <div class="rail-head"><h2>정리본</h2><button type="button" class="rail-toggle" onclick="toggleNoteRail()" aria-label="정리본 목록 접기">접기</button></div>
      <label>액션 키</label><input id="key" type="password" placeholder="처음 한 번 입력" />
      <label>과목</label><input id="subject" placeholder="CRE" />
      <label>종류</label>
      <select id="sourceType">
        <option value="">전체 학습자료</option>
        <option value="generated_note">GPT 생성 정리본</option>
        <option value="exam_cram">시험 직전 정리</option>
        <option value="external_note">외부 정리본</option>
        <option value="calculator_manual">계산기 해설</option>
      </select>
      <button onclick="listNotes()">목록 불러오기</button>
      <button class="secondary" onclick="newNote('generated_note')">새 정리본</button>
      <button class="secondary" onclick="newNote('exam_cram')">새 시험직전</button>
      <p class="hint">정리본 본문을 워드처럼 직접 수정합니다. Markdown 원문은 평소에 보이지 않습니다.</p>
      <div id="list" class="list"></div>
    </aside>
    <section class="editor">
      <div class="toolbar">
        <input id="title" placeholder="제목" />
        <button onclick="saveNote()">저장</button>
        <button class="secondary" onclick="openVersionDialog()">이전 버전</button>
        <span class="spacer"></span>
        <button class="ghost" onclick="toggleSource()" id="sourceToggle">고급: 원문 보기</button>
      </div>
      <div class="workarea">
        <article id="doc" class="doc" contenteditable="true" spellcheck="false"></article>
        <dialog id="sourceDialog">
          <div class="dialog-head"><b>Markdown 원문</b><button onclick="toggleSource()">닫기</button></div>
          <textarea id="markdown" spellcheck="false" placeholder="Markdown 원문"></textarea>
          <p class="hint">수식 자체를 고칠 때만 사용하세요. 닫으면 문서 화면에 다시 반영됩니다.</p>
        </dialog>
        <dialog id="versionDialog">
          <div class="dialog-head"><b>이전 버전</b><button onclick="closeVersionDialog()">닫기</button></div>
          <div id="versionList" class="version-list"></div>
          <p class="hint">복원하면 현재 문서가 선택한 버전 내용으로 바뀌고, 복원 기록도 새 버전으로 저장됩니다.</p>
        </dialog>
      </div>
    </section>
  </main>
  <script src="app.js?v=23_6"></script>

  <div class="study-right-rail" aria-label="빠른 편집 도구">
    <button type="button" onclick="highlightSelection()">형광펜</button>
    <button type="button" class="light" onclick="clearHighlight()">형광펜 지우기</button>
    <label class="rail-filebtn">이미지<input id="imageInput" type="file" accept="image/*" onchange="insertImage(event)" /></label>
    <button type="button" class="light" onclick="insertSlideImage()">슬라이드</button>
    <label class="rail-select">이미지 크기<select id="imageScale" onchange="setDefaultImageScale(this.value)">
      <option value="10">10%</option><option value="20">20%</option><option value="30">30%</option><option value="40">40%</option><option value="50">50%</option><option value="60">60%</option><option value="70">70%</option><option value="80">80%</option><option value="90">90%</option><option value="100" selected>100%</option>
    </select></label>
    <button type="button" class="light" onclick="applyImageScaleToAll()">전체 적용</button>
    <button type="button" class="light" onclick="downloadMd()">Markdown</button>
    <button type="button" class="light" onclick="downloadDocx()">Word</button>
    <button type="button" class="light" onclick="printPdf()">PDF</button>
  </div>
</body>
</html>
